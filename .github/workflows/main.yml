name: Fetch AI news

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6,18 * * *'

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install TechSnif CLI
        run: npm install -g @techsnif/cli

      - name: Run fetch script
        run: node scripts/fetch-ai-news.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sndbx/ai-news.jsonl
          git diff --cached --quiet || git commit -m "Update AI news log"
          git push
